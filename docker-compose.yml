version: '3.1'

services:
    redis:
        image: redis:alpine
        container_name: project-redis
        networks:
            - project-network

    mysql:
        image: mysql:8.0
        working_dir: /application
        container_name: project-mysql
        volumes:
            - .:/application
            - mysql-volume:/var/lib/mysql
        environment:
            - MYSQL_DATABASE=gameDBW
            - MYSQL_ROOT_PASSWORD=123123123
            - MYSQL_PASSWORD=123123123
        ports:
            - '8022:3306'
        networks:
            - project-network

    postgresql:
        image: postgres:15-alpine
        container_name: project-postgresql
        working_dir: /application
        volumes:
            - postgres-volume:/var/lib/postgresql/data
        environment:
            - POSTGRES_DB=gameDB_pg
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=123123123
        ports:
            - '5432:5432'
        networks:
            - project-network

    webserver:
        image: nginx:alpine
        working_dir: /application
        container_name: project-nginx
        depends_on:
            - php-fpm
        volumes:
            - ./:/application
            - ./phpdocker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
        ports:
            - '8020:80'
        networks:
            - project-network

    php-fpm:
        build: phpdocker/php-fpm
        platform: linux/amd64
        container_name: project-php-fpm
        working_dir: /application
        environment:
            XDEBUG_MODE: "coverage"
        security_opt:
            - seccomp=unconfined
        depends_on:
            - mysql
            - redis
            - postgresql
        volumes:
            - ./:/application
            - ./phpdocker/php-fpm/php-ini-overrides.ini:/etc/php/8.1/fpm/conf.d/99-overrides.ini
        networks:
            - project-network

volumes:
    mysql-volume:
    postgres-volume:

networks:
    project-network:
        driver: bridge